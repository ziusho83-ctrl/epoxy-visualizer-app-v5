<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0f1a" />
    <title>Drop Dash</title>
    <style>
      :root {
        --bg-1: #0b0f1a;
        --bg-2: #182238;
        --accent: #ffd166;
        --accent-2: #ef476f;
        --ink: #f3f5ff;
        --muted: #8892b0;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(
            ellipse at top,
            var(--bg-2) 0%,
            var(--bg-1) 60%
          )
          fixed;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }

      #stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(180deg, #1b2848 0%, #0b0f1a 100%);
      }

      .hud {
        position: fixed;
        top: env(safe-area-inset-top, 0);
        left: 0;
        right: 0;
        padding: 14px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.04em;
        pointer-events: none;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      }

      .hud .label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin-bottom: 2px;
      }

      .hud .value {
        font-variant-numeric: tabular-nums;
        font-size: 22px;
      }

      .hud .right {
        text-align: right;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(5, 8, 16, 0.75);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 10;
        transition: opacity 200ms ease;
      }

      .overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .panel {
        width: min(360px, 100%);
        text-align: center;
      }

      .title {
        font-size: 44px;
        font-weight: 900;
        margin: 0 0 6px;
        letter-spacing: 0.02em;
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent-2) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .subtitle {
        color: var(--muted);
        margin: 0 0 26px;
        font-size: 15px;
      }

      .stats {
        display: flex;
        justify-content: center;
        gap: 28px;
        margin: 10px 0 22px;
      }

      .stat .v {
        font-size: 28px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }

      .stat .k {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        padding: 16px 28px;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #111;
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent-2) 100%
        );
        border-radius: 999px;
        box-shadow: 0 10px 30px rgba(239, 71, 111, 0.35),
          0 2px 6px rgba(0, 0, 0, 0.3);
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      button:active {
        transform: translateY(2px) scale(0.98);
        box-shadow: 0 6px 18px rgba(239, 71, 111, 0.25);
      }

      .hint {
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      .kbd {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="game"></canvas>
    </div>

    <div class="hud">
      <div>
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="right">
        <div class="label">Best</div>
        <div class="value" id="best">0</div>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <div class="panel">
        <h1 class="title">Drop Dash</h1>
        <p class="subtitle" id="subtitle">
          Tap to jump. Dodge the blocks. Go as far as you can.
        </p>
        <div class="stats" id="stats" style="display: none">
          <div class="stat">
            <div class="v" id="finalScore">0</div>
            <div class="k">Score</div>
          </div>
          <div class="stat">
            <div class="v" id="finalBest">0</div>
            <div class="k">Best</div>
          </div>
        </div>
        <button id="startBtn">Play</button>
        <div class="hint">
          Tap anywhere · <span class="kbd">Space</span> to jump
        </div>
      </div>
    </div>

    <script>
      (function () {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const bestEl = document.getElementById("best");
        const overlay = document.getElementById("overlay");
        const subtitle = document.getElementById("subtitle");
        const stats = document.getElementById("stats");
        const finalScore = document.getElementById("finalScore");
        const finalBest = document.getElementById("finalBest");
        const startBtn = document.getElementById("startBtn");

        const BEST_KEY = "dropdash.best";
        let best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0;
        bestEl.textContent = best;

        let W = 0;
        let H = 0;
        let dpr = 1;

        function resize() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = Math.floor(W * dpr);
          canvas.height = Math.floor(H * dpr);
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener("resize", resize);
        window.addEventListener("orientationchange", resize);

        const state = {
          running: false,
          t: 0,
          score: 0,
          speed: 0,
          baseSpeed: 320,
          player: null,
          obstacles: [],
          clouds: [],
          particles: [],
          groundY: 0,
          spawnTimer: 0,
          spawnInterval: 1.2,
        };

        function groundY() {
          return H - Math.max(80, H * 0.18);
        }

        function resetPlayer() {
          state.player = {
            x: W * 0.22,
            y: groundY(),
            vy: 0,
            r: 22,
            grounded: true,
            jumps: 0,
            squash: 1,
          };
        }

        function seedClouds() {
          state.clouds = [];
          for (let i = 0; i < 5; i++) {
            state.clouds.push({
              x: Math.random() * W,
              y: 40 + Math.random() * (H * 0.35),
              r: 20 + Math.random() * 34,
              s: 10 + Math.random() * 25,
              o: 0.08 + Math.random() * 0.12,
            });
          }
        }

        function startGame() {
          resize();
          state.running = true;
          state.t = 0;
          state.score = 0;
          state.speed = state.baseSpeed;
          state.obstacles = [];
          state.particles = [];
          state.spawnTimer = 0.6;
          state.spawnInterval = 1.25;
          state.groundY = groundY();
          resetPlayer();
          seedClouds();
          overlay.classList.add("hidden");
          scoreEl.textContent = "0";
          last = performance.now();
          requestAnimationFrame(loop);
        }

        function endGame() {
          state.running = false;
          const s = Math.floor(state.score);
          if (s > best) {
            best = s;
            localStorage.setItem(BEST_KEY, String(best));
          }
          bestEl.textContent = best;
          finalScore.textContent = s;
          finalBest.textContent = best;
          subtitle.textContent =
            s >= best && s > 0
              ? "New best! Tap to run it back."
              : "Nice run. Tap to try again.";
          stats.style.display = "flex";
          startBtn.textContent = "Play again";
          overlay.classList.remove("hidden");
        }

        function jump() {
          if (!state.running) return;
          const p = state.player;
          if (p.grounded) {
            p.vy = -720;
            p.grounded = false;
            p.jumps = 1;
            p.squash = 0.75;
            spawnBurst(p.x, p.y + p.r, 8, "#ffd166");
          } else if (p.jumps < 2) {
            p.vy = -560;
            p.jumps = 2;
            p.squash = 0.8;
            spawnBurst(p.x, p.y, 10, "#ef476f");
          }
        }

        function spawnObstacle() {
          const variant = Math.random();
          if (variant < 0.7) {
            const w = 22 + Math.random() * 24;
            const h = 30 + Math.random() * 60;
            state.obstacles.push({
              type: "block",
              x: W + 40,
              y: state.groundY - h + 10,
              w,
              h,
              passed: false,
            });
          } else {
            state.obstacles.push({
              type: "spike",
              x: W + 40,
              y: state.groundY - 24 + 10,
              w: 34,
              h: 30,
              passed: false,
            });
          }
        }

        function spawnBurst(x, y, n, color) {
          for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2;
            const v = 60 + Math.random() * 140;
            state.particles.push({
              x,
              y,
              vx: Math.cos(a) * v,
              vy: Math.sin(a) * v - 40,
              life: 0.5 + Math.random() * 0.3,
              age: 0,
              color,
              r: 2 + Math.random() * 3,
            });
          }
        }

        function rectIntersectsCircle(rx, ry, rw, rh, cx, cy, cr) {
          const nx = Math.max(rx, Math.min(cx, rx + rw));
          const ny = Math.max(ry, Math.min(cy, ry + rh));
          const dx = cx - nx;
          const dy = cy - ny;
          return dx * dx + dy * dy < cr * cr;
        }

        let last = performance.now();
        function loop(now) {
          if (!state.running) return;
          const dt = Math.min(0.033, (now - last) / 1000);
          last = now;
          update(dt);
          render();
          requestAnimationFrame(loop);
        }

        function update(dt) {
          state.t += dt;
          state.groundY = groundY();
          state.speed = state.baseSpeed + Math.min(380, state.t * 14);
          state.spawnInterval = Math.max(0.55, 1.25 - state.t * 0.012);

          const p = state.player;
          p.vy += 1800 * dt;
          p.y += p.vy * dt;
          if (p.y >= state.groundY) {
            p.y = state.groundY;
            p.vy = 0;
            if (!p.grounded) {
              p.squash = 1.25;
              spawnBurst(p.x, p.y + p.r, 6, "#ffffff");
            }
            p.grounded = true;
            p.jumps = 0;
          }
          p.squash += (1 - p.squash) * Math.min(1, dt * 10);

          state.spawnTimer -= dt;
          if (state.spawnTimer <= 0) {
            spawnObstacle();
            state.spawnTimer = state.spawnInterval * (0.8 + Math.random() * 0.5);
          }

          for (let i = state.obstacles.length - 1; i >= 0; i--) {
            const o = state.obstacles[i];
            o.x -= state.speed * dt;
            if (!o.passed && o.x + o.w < p.x - p.r) {
              o.passed = true;
              state.score += 10;
            }
            if (o.x + o.w < -20) state.obstacles.splice(i, 1);

            if (
              rectIntersectsCircle(o.x, o.y, o.w, o.h, p.x, p.y, p.r - 2)
            ) {
              spawnBurst(p.x, p.y, 22, "#ef476f");
              endGame();
              return;
            }
          }

          for (const c of state.clouds) {
            c.x -= c.s * dt;
            if (c.x + c.r < -10) {
              c.x = W + c.r + Math.random() * 80;
              c.y = 40 + Math.random() * (H * 0.35);
            }
          }

          for (let i = state.particles.length - 1; i >= 0; i--) {
            const pa = state.particles[i];
            pa.age += dt;
            if (pa.age >= pa.life) {
              state.particles.splice(i, 1);
              continue;
            }
            pa.vy += 600 * dt;
            pa.x += pa.vx * dt;
            pa.y += pa.vy * dt;
          }

          state.score += dt * 8;
          scoreEl.textContent = Math.floor(state.score);
        }

        function render() {
          ctx.clearRect(0, 0, W, H);

          for (const c of state.clouds) {
            ctx.fillStyle = `rgba(255,255,255,${c.o})`;
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
            ctx.arc(c.x + c.r * 0.7, c.y + 4, c.r * 0.75, 0, Math.PI * 2);
            ctx.arc(c.x - c.r * 0.6, c.y + 6, c.r * 0.7, 0, Math.PI * 2);
            ctx.fill();
          }

          const gy = state.groundY + state.player.r;
          const grad = ctx.createLinearGradient(0, gy, 0, H);
          grad.addColorStop(0, "#1c2a4a");
          grad.addColorStop(1, "#070b15");
          ctx.fillStyle = grad;
          ctx.fillRect(0, gy, W, H - gy);

          ctx.strokeStyle = "rgba(255,209,102,0.6)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, gy);
          ctx.lineTo(W, gy);
          ctx.stroke();

          ctx.strokeStyle = "rgba(255,255,255,0.12)";
          ctx.lineWidth = 2;
          const dash = 28;
          const offset = (state.t * state.speed) % (dash * 2);
          ctx.beginPath();
          for (let x = -offset; x < W; x += dash * 2) {
            ctx.moveTo(x, gy + 16);
            ctx.lineTo(x + dash, gy + 16);
          }
          ctx.stroke();

          for (const o of state.obstacles) {
            if (o.type === "block") {
              const g2 = ctx.createLinearGradient(o.x, o.y, o.x, o.y + o.h);
              g2.addColorStop(0, "#ef476f");
              g2.addColorStop(1, "#8e1b3a");
              ctx.fillStyle = g2;
              roundRect(ctx, o.x, o.y, o.w, o.h, 6);
              ctx.fill();
              ctx.fillStyle = "rgba(255,255,255,0.18)";
              ctx.fillRect(o.x + 4, o.y + 4, o.w - 8, 3);
            } else {
              ctx.fillStyle = "#ffd166";
              ctx.beginPath();
              ctx.moveTo(o.x, o.y + o.h);
              ctx.lineTo(o.x + o.w / 2, o.y);
              ctx.lineTo(o.x + o.w, o.y + o.h);
              ctx.closePath();
              ctx.fill();
              ctx.fillStyle = "rgba(0,0,0,0.22)";
              ctx.beginPath();
              ctx.moveTo(o.x + o.w / 2, o.y);
              ctx.lineTo(o.x + o.w, o.y + o.h);
              ctx.lineTo(o.x + o.w / 2, o.y + o.h);
              ctx.closePath();
              ctx.fill();
            }
          }

          const p = state.player;
          const sx = p.squash;
          const sy = 2 - p.squash;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.scale(sx, sy);
          const pg = ctx.createRadialGradient(-6, -6, 2, 0, 0, p.r);
          pg.addColorStop(0, "#fff4c2");
          pg.addColorStop(1, "#ffd166");
          ctx.fillStyle = pg;
          ctx.beginPath();
          ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#111";
          ctx.beginPath();
          ctx.arc(7, -4, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          for (const pa of state.particles) {
            const a = 1 - pa.age / pa.life;
            ctx.globalAlpha = Math.max(0, a);
            ctx.fillStyle = pa.color;
            ctx.beginPath();
            ctx.arc(pa.x, pa.y, pa.r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }

        function roundRect(ctx, x, y, w, h, r) {
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y, x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x, y + h, r);
          ctx.arcTo(x, y + h, x, y, r);
          ctx.arcTo(x, y, x + w, y, r);
          ctx.closePath();
        }

        startBtn.addEventListener("click", startGame);

        function onTap(e) {
          if (!state.running) {
            if (
              e.target.closest &&
              e.target.closest("button, .overlay .panel")
            )
              return;
            startGame();
          } else {
            jump();
          }
        }

        window.addEventListener("pointerdown", onTap);
        window.addEventListener("keydown", (e) => {
          if (e.code === "Space" || e.code === "ArrowUp") {
            e.preventDefault();
            if (!state.running) startGame();
            else jump();
          }
        });

        window.addEventListener("blur", () => {
          if (state.running) endGame();
        });
      })();
    </script>
  </body>
</html>
